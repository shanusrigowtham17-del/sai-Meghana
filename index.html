<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sai Meghana Technical Consultants LLP — Engineering Excellence</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<!-- GSAP for Cinematic Scroll -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
  :root {
    --deep-navy: #001229;
    --midnight-blue: #002244;
    --cyan: #00adef;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: var(--deep-navy);
    color: #ffffff;
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }
  
  /* 3D Canvas */
  #webgl-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none; /* Let clicks pass through to UI */
  }

  /* Spatial UI Overlays */
  .ui-layer {
    position: relative;
    z-index: 10;
    mix-blend-mode: difference;
  }

  /* Header */
  header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 2rem 4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 50;
    pointer-events: auto;
  }
  .brand { display: flex; align-items: center; gap: 1.5rem; }
  .logo-box {
    width: 72px; /* Increased Logo */
    height: 72px;
    border: 2px solid white;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
  }
  .logo-box-inner { width: 36px; height: 36px; background: var(--cyan); }
  .brand-text h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.15em; }
  .brand-text p { font-size: 0.75rem; font-weight: 600; color: var(--cyan); letter-spacing: 0.1em; margin-top: 4px;}
  nav { display: flex; gap: 3rem; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em; }

  /* Scroll Sections */
  .section {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 10vw;
    pointer-events: auto;
  }
  .phase-label {
    font-family: monospace;
    color: var(--cyan);
    letter-spacing: 0.3em;
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }
  .section h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 6vw, 5.5rem);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 2rem;
    max-width: 800px;
  }
  .section p {
    font-size: 1.1rem;
    font-weight: 300;
    color: #cccccc;
    max-width: 500px;
    line-height: 1.8;
  }

  /* Telemetry Footer */
  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 2rem 4rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: 1px solid rgba(255,255,255,0.1);
    z-index: 50;
    font-family: monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
  }
  .telemetry-left { color: #888; line-height: 1.6; }
  .telemetry-left span { color: var(--cyan); }
  .telemetry-right { display: flex; gap: 4rem; }
  .t-block { display: flex; flex-direction: column; }
  .t-block .lbl { color: #666; margin-bottom: 4px; }

  /* Spacer for scroll height */
  #scroll-proxy { height: 500vh; position: absolute; top: 0; width: 100%; z-index: -1; }
</style>
</head>
<body>

<div id="webgl-container"></div>

<div class="ui-layer">
  <header>
    <div class="brand">
      <div class="logo-box">
        <!-- SVG Logo -->
        <svg viewBox="0 0 200 130" fill="none" style="width: 80%; height: 80%;">
          <g transform="translate(100, 5)">
            <polygon points="0,0 22,25 0,16" fill="#ffffff" stroke="#002147" stroke-width="2"/>
            <polygon points="0,0 -22,25 0,16" fill="#00adef" stroke="#002147" stroke-width="2"/>
            <polygon points="0,11 44,48 0,33" fill="#ffffff" stroke="#002147" stroke-width="2"/>
            <polygon points="0,11 -44,48 0,33" fill="#00adef" stroke="#002147" stroke-width="2"/>
            <polygon points="0,22 66,71 0,50" fill="#ffffff" stroke="#002147" stroke-width="2"/>
            <polygon points="0,22 -66,71 0,50" fill="#00adef" stroke="#002147" stroke-width="2"/>
          </g>
        </svg>
      </div>
      <div class="brand-text">
        <h1>SAI MEGHANA</h1>
        <p>TECHNICAL CONSULTANTS</p>
      </div>
    </div>
    <nav>
      <span>HOME</span><span>SERVICES</span><span>EXPERTISE</span><span>CONTACT</span>
    </nav>
  </header>

  <!-- Content synced with ScrollTrigger -->
  <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100vh;">
    <div class="section" id="sec-content">
      <div class="phase-label" id="t-sub">PHASE I — BLUEPRINT VOID</div>
      <h2 id="t-head">ENGINEERING<br>EXCELLENCE</h2>
      <p id="t-desc">A digital twin of futuristic industrial potential. We architect the unseen.</p>
    </div>
  </div>

  <footer>
    <div class="telemetry-left">
      SYSTEM_STATE: <span>NOMINAL</span><br>
      LOC: HYDERABAD, TS<br>
      EST: 2+ YRS
    </div>
    <div class="telemetry-right">
      <div class="t-block"><span class="lbl">SCROLL</span><span>TO EVOLVE</span></div>
      <div class="t-block"><span class="lbl">PHASE</span><span id="t-phase">01 / 05</span></div>
    </div>
  </footer>
</div>

<div id="scroll-proxy"></div>

<script>
// ─────────────────────────────────────────────────────────────────
// UI CONTENT DATA
// ─────────────────────────────────────────────────────────────────
const sections = [
  { sub: "PHASE I — BLUEPRINT VOID", head: "ENGINEERING<br>EXCELLENCE", desc: "A digital twin of futuristic industrial potential. We architect the unseen." },
  { sub: "PHASE II — ROBOTIC CONSTRUCTION", head: "DYNAMIC<br>ASSEMBLY", desc: "Procedural structural growth. Heavy machine foundations and internal utilities emerge." },
  { sub: "PHASE III — STEEL & CONCRETE", head: "STRUCTURAL<br>GROWTH", desc: "Silos, chimneys, and industrial sheds assemble. The architecture of industry takes physical form." },
  { sub: "PHASE IV — TELEMETRY", head: "INDUSTRIAL<br>INTELLIGENCE", desc: "Data visualization architecture. Monitoring vendor selection, contract management, and site supervision." },
  { sub: "PHASE V — COMPLETE", head: "SAI MEGHANA<br>LLP", desc: "2+ years of precision, integrity, and engineering authority in Hyderabad, Telangana." }
];

// ─────────────────────────────────────────────────────────────────
// THREE.JS ENGINE SETUP
// ─────────────────────────────────────────────────────────────────
const container = document.getElementById('webgl-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color('#002244'); // Midnight Blue
scene.fog = new THREE.FogExp2('#002244', 0.015);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
dirLight.position.set(30, 50, -20);
dirLight.castShadow = true;
scene.add(dirLight);
const spotLight = new THREE.SpotLight('#00adef', 4);
spotLight.position.set(-20, 20, 20);
scene.add(spotLight);

// ─────────────────────────────────────────────────────────────────
// CUSTOM BLUEPRINT SHADER & MATERIALS
// ─────────────────────────────────────────────────────────────────
const blueprintMaterial = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 0 },
    uColor: { value: new THREE.Color('#00adef') },
    uProgress: { value: 0.0 }
  },
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexShader: `
    varying vec2 vUv; varying vec3 vPos;
    void main() { vUv = uv; vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform float time; uniform vec3 uColor; uniform float uProgress;
    varying vec2 vUv; varying vec3 vPos;
    void main() {
      vec2 grid = abs(fract(vUv * 10.0 - 0.5) - 0.5) / fwidth(vUv * 10.0);
      float line = min(grid.x, grid.y);
      float alpha = 1.0 - min(line, 1.0);
      float scan = sin(vPos.y * 4.0 - time * 2.0) * 0.5 + 0.5;
      float opacity = (alpha + scan * 0.5) * (1.0 - uProgress) * 0.7;
      gl_FragColor = vec4(uColor, opacity);
    }
  `
});

const solidMaterial = new THREE.MeshStandardMaterial({
  color: 0xffffff, roughness: 0.1, metalness: 0.2
});

// Ground
const groundGeo = new THREE.PlaneGeometry(200, 200);
const groundMat = new THREE.MeshStandardMaterial({ color: '#001229', roughness: 0.2, metalness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.1;
ground.receiveShadow = true;
scene.add(ground);

// ─────────────────────────────────────────────────────────────────
// PROCEDURAL CAMPUS GENERATION
// ─────────────────────────────────────────────────────────────────
const campusGroup = new THREE.Group();
scene.add(campusGroup);
const buildings = [];

const gridSize = 10;
for(let i=0; i<gridSize*gridSize; i++) {
  const x = (i % gridSize) - gridSize/2;
  const z = Math.floor(i / gridSize) - gridSize/2;
  if(Math.abs(x) < 1 && Math.abs(z) < 1) continue; // Leave center open
  
  const h = Math.random() * 8 + 2;
  const isSilo = Math.random() > 0.85;
  const pos = new THREE.Vector3(x*7 + (Math.random()-0.5)*2, 0, z*7 + (Math.random()-0.5)*2);
  const scale = new THREE.Vector3(isSilo? 1.5 : 2+Math.random()*2, h, isSilo? 1.5 : 2+Math.random()*2);
  
  const bldg = new THREE.Group();
  bldg.position.copy(pos);
  
  const geo = isSilo ? new THREE.CylinderGeometry(scale.x, scale.x, 1, 16) : new THREE.BoxGeometry(scale.x, 1, scale.z);
  geo.translate(0, 0.5, 0); // Origin at bottom
  
  const bpMesh = new THREE.Mesh(geo, blueprintMaterial);
  bpMesh.scale.y = scale.y;
  
  const solidMesh = new THREE.Mesh(geo, solidMaterial);
  solidMesh.scale.y = 0.01; // Start flat
  solidMesh.castShadow = true;
  solidMesh.receiveShadow = true;

  bldg.add(bpMesh);
  bldg.add(solidMesh);
  campusGroup.add(bldg);
  
  buildings.push({ group: bldg, bp: bpMesh, solid: solidMesh, targetHeight: scale.y, seed: Math.random() });
}

// Particles
const partsGeo = new THREE.BufferGeometry();
const partsPos = [];
for(let i=0; i<1000; i++) {
  partsPos.push((Math.random()-0.5)*100, Math.random()*20, (Math.random()-0.5)*100);
}
partsGeo.setAttribute('position', new THREE.Float32BufferAttribute(partsPos, 3));
const partsMat = new THREE.PointsMaterial({ color: '#00adef', size: 0.2, transparent: true, opacity: 0.6 });
const particleSystem = new THREE.Points(partsGeo, partsMat);
scene.add(particleSystem);

// ─────────────────────────────────────────────────────────────────
// GSAP SCROLL ANIMATION SYSTEM
// ─────────────────────────────────────────────────────────────────
gsap.registerPlugin(ScrollTrigger);

// App State
const state = { scrollProgress: 0 };

ScrollTrigger.create({
  trigger: "#scroll-proxy",
  start: "top top",
  end: "bottom bottom",
  onUpdate: (self) => {
    state.scrollProgress = self.progress;
    
    // UI Update Logic
    const phaseIndex = Math.min(4, Math.floor(self.progress * 5));
    document.getElementById('t-phase').innerText = `0${phaseIndex+1} / 05`;
    
    const content = sections[phaseIndex];
    const headEl = document.getElementById('t-head');
    if(headEl.innerHTML !== content.head) {
      // Simple fade out/in for text
      gsap.to('#sec-content', { opacity: 0, y: -20, duration: 0.2, onComplete: () => {
        document.getElementById('t-sub').innerText = content.sub;
        headEl.innerHTML = content.head;
        document.getElementById('t-desc').innerText = content.desc;
        gsap.to('#sec-content', { opacity: 1, y: 0, duration: 0.4 });
      }});
    }
  }
});

// ─────────────────────────────────────────────────────────────────
// RENDER LOOP
// ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();
  const p = state.scrollProgress;

  // 1. Update Blueprint Shader
  blueprintMaterial.uniforms.time.value = time;
  blueprintMaterial.uniforms.uProgress.value = Math.max(0, Math.min(1, (p - 0.2) * 3.33));

  // 2. Animate Buildings
  buildings.forEach(b => {
    // Growth threshold based on scroll and random seed
    const growth = Math.max(0, Math.min(1, (p - 0.3 - b.seed * 0.1) * 2.5));
    const easeGrowth = 1 - Math.pow(1 - growth, 3); // Cubic out
    b.solid.scale.y = easeGrowth * b.targetHeight + 0.01;
  });

  // 3. Cinematic Camera Movement
  const targetX = THREE.MathUtils.lerp(0, -15, p);
  const targetY = THREE.MathUtils.lerp(40, 3, p);
  const targetZ = THREE.MathUtils.lerp(50, 15, p);
  camera.position.lerp(new THREE.Vector3(targetX, targetY, targetZ), 0.05);

  const lookAtX = THREE.MathUtils.lerp(0, 10, p);
  const lookAtY = THREE.MathUtils.lerp(0, 8, p);
  const lookAtZ = THREE.MathUtils.lerp(0, -10, p);
  
  // Smooth lookAt tracking
  const currentLookAt = new THREE.Vector3();
  camera.getWorldDirection(currentLookAt);
  const targetLookAt = new THREE.Vector3(lookAtX, lookAtY, lookAtZ);
  camera.lookAt(camera.position.clone().add(currentLookAt.lerp(targetLookAt.sub(camera.position), 0.05)));

  // 4. Atmosphere & Particles
  scene.fog.density = THREE.MathUtils.lerp(0.015, 0.005, p);
  particleSystem.rotation.y = time * 0.05;

  renderer.render(scene, camera);
}

animate();

// Resize Handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
